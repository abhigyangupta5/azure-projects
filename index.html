<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azure Translator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="popup" id="popup"></div>

  <div class="container">
    <h1>Azure Translator</h1>
    <p class="subtitle">Enter your Azure API key and region below.</p>

    <div class="api-box">
      <input type="text" id="apiKey" placeholder="Paste Azure API Key here">
      <input type="text" id="region" placeholder="Region e.g. eastasia">
    </div>

    <div class="translator">

      <div class="panel">
        <select id="fromLang">
          <option value="en">English</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="hi">Hindi</option>
          <option value="ja">Japanese</option>
        </select>

        <textarea id="inputText" placeholder="Enter text to translate..."></textarea>

        <div class="bottom">
          <button class="btn" onclick="translateText()">Translate</button>

          <div class="icon-group">
            <button class="icon-btn" onclick="pasteText()">📋</button>
            <button class="icon-btn" onclick="clearInput()">🗑️</button>
          </div>
        </div>
      </div>

      <button class="swap" onclick="swapLanguages()">⇄</button>

      <div class="panel">
        <select id="toLang">
          <option value="fr">French</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="hi">Hindi</option>
          <option value="ja">Japanese</option>
        </select>

        <textarea id="outputText" readonly placeholder="Translated text will appear here..."></textarea>

        <div class="bottom">
          <button class="btn" onclick="copyOutput()">Copy Result</button>

          <div class="icon-group">
            <button class="icon-btn" onclick="speakOutput()">🔊</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
