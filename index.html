<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azure Translator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="background-blur blur1"></div>
  <div class="background-blur blur2"></div>

  <div class="popup" id="popup"></div>

  <div class="history-modal" id="historyModal">
    <div class="history-content">
      <div class="history-top">
        <h2>Translation History</h2>
        <button class="close-btn" onclick="closeHistory()">Close</button>
      </div>

      <div id="historyList"></div>
    </div>
  </div>

  <div class="app">
    <div class="topbar">
      <div class="logo">
        <div class="logo-icon">T</div>

        <div>
          <h1>Azure Translator</h1>
          <p>Translate instantly with Microsoft Azure</p>
        </div>
      </div>

      <button class="history-btn" onclick="openHistory()">
        View History
      </button>
    </div>

    <div class="translator-box">

      <div class="panel">
        <div class="panel-header">
          <select id="fromLang">
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="hi">Hindi</option>
            <option value="ja">Japanese</option>
          </select>
        </div>

        <textarea
          id="inputText"
          placeholder="Type or paste text here..."
        ></textarea>

        <div class="panel-footer">
          <span class="char-count" id="charCount">0 characters</span>

          <div class="icon-group">
            <button class="icon-btn" onclick="pasteText()">📋</button>
            <button class="icon-btn" onclick="speakInput()">🎤</button>
            <button class="icon-btn" onclick="clearText()">🗑️</button>
          </div>
        </div>
      </div>

      <button class="swap-btn" onclick="swapLanguages()">⇄</button>

      <div class="panel">
        <div class="panel-header">
          <select id="toLang">
            <option value="fr">French</option>
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="hi">Hindi</option>
            <option value="ja">Japanese</option>
          </select>
        </div>

        <textarea
          id="outputText"
          placeholder="Translated text will appear here..."
          readonly
        ></textarea>

        <div class="panel-footer">
          <button class="translate-btn" onclick="translateText()">
            Translate
          </button>

          <div class="icon-group">
            <button class="icon-btn" onclick="copyOutput()">📄</button>
            <button class="icon-btn" onclick="speakOutput()">🔊</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
